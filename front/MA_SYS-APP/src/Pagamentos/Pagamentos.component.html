<div class="page-header">
  <div class="page-title-group">
    <h1>Pagamentos</h1>
    <p>Gerencie as formas de pagamentos da academia</p>
  </div>
</div>

<div class="pagamentos-page">
  <div class="pagamento-grid">
    <div class="empty-state" *ngIf="!pagamentos || pagamentos.length === 0">
      <i class="fa-solid fa-user-slash"></i>
      <p>Nenhum pagamento cadastrado</p>
    </div>
    <div class="pagamento-card" *ngFor="let pagamento of pagamentos">
      <!-- MENU -->
      <div class="card-menu">
        <button class="menu-btn" (click)="toggleMenu(pagamento, $event)">
          <i class="fa-solid fa-ellipsis"></i>
        </button>

        <div class="menu-dropdown" *ngIf="pagamento.menuAberto">
          <button *ngIf="editarId !== pagamento.id" (click)="editarFormaPagamento(pagamento)">
            <i class="fa-solid fa-pen"></i>
            Editar
          </button>

          <button *ngIf="editarId === pagamento.id" (click)="salvarEdicao(pagamento)">
            <i class="fa-solid fa-check"></i>
            Salvar
          </button>

          <button *ngIf="editarId === pagamento.id" class="danger" (click)="cancelarEdicao()">
            <i class="fa-solid fa-ban"></i>
            Cancelar
          </button>
        </div>
      </div>

      <!-- HEADER CENTRALIZADO -->
      <div class="card-header-center">
        <div class="avatar">
          {{ getInicial(pagamento.nome) }}
        </div>

        <div class="professor-title">
          <span *ngIf="editarId !== pagamento.id">
            {{ pagamento.nome }}
          </span>

          <input *ngIf="editarId === pagamento.id" [(ngModel)]="nome" class="edit-input" />
        </div>
      </div>

      <!-- BODY -->
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <i class="fa-solid fa-award"></i>
            <div class="info-content">
              <span class="label">Parcelas</span>
              <span class="value" *ngIf="editarId !== pagamento.id">
                {{ pagamento.parcelas }}
              </span>
              <input *ngIf="editarId === pagamento.id" [(ngModel)]="parcelas" class="edit-input" />
            </div>
          </div>

          <div class="info-item">
            <i class="fa-solid fa-wallet"></i>
            <div class="info-content">
              <span class="label">Taxa %</span>
              <span class="value" *ngIf="editarId !== pagamento.id">
                {{ pagamento.taxa }}
              </span>
              <input *ngIf="editarId === pagamento.id" [(ngModel)]="taxa" class="edit-input" />
            </div>
          </div>

          <div class="info-item">
            <i class="fa-solid fa-calendar"></i>
            <div class="info-content">
              <span class="label">Qtd dias</span>
              <span class="value" *ngIf="editarId !== pagamento.id">
                {{ pagamento.dias }}
              </span>
              <input *ngIf="editarId === pagamento.id" [(ngModel)]="dias" class="edit-input" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTÃO FLUTUANTE -->

<button class="floating-add" (click)="openModalNovoPgto(templateNovaFormaPgto)">
  <i class="fa-solid fa-plus"></i>
  <span class="fab-text">Forma de Pagamento </span>
</button>

<ng-template #templateNovaFormaPgto>
  <div class="modal-content">
    <!-- HEADER -->
    <div class="modal-header">
      <h4>Nova Forma de Pagamento</h4>
      <button type="button" class="btn-close" (click)="modalRef?.hide()"></button>
    </div>

    <!-- BODY -->
    <div class="modal-body">
      <form class="form-grid">
        <!-- NOME (FULL) -->
        <div class="form-group full">
          <label>Nome</label>
          <input [(ngModel)]="nome" name="nome" />
        </div>

        <!-- GRADUAÇÃO -->
        <div class="form-group">
          <label>Qtd parcelas</label>
          <input [(ngModel)]="parcelas" name="graduacao" />
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Taxa %</label>
          <input [(ngModel)]="taxa" name="taxa" />
        </div>

        <!-- TELEFONE -->
        <div class="form-group">
          <label>Qtd dias</label>
          <input [(ngModel)]="dias" name="dias" />
        </div>
      </form>
    </div>

    <!-- FOOTER -->
    <div class="modal-footer form-actions">
      <button class="btn-cancel" (click)="modalRef?.hide()">Cancelar</button>
      <button class="btn-save" (click)="cadastrarNovaFormaPgto()">Salvar Forma de Pagamento</button>
    </div>
  </div>
</ng-template>
