<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <span class="logo-text" *ngIf="!sidebarCollapsed"> MartialArtsSys </span>

      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <nav>
      <a *ngIf="isAdmin()" routerLink="/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        <span *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <a routerLink="/dash-acad">
        <i class="fa-solid fa-chart-line"></i>
        <span *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <a *ngIf="isAdmin()" routerLink="/academias">
        <i class="fa-solid fa-user"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Academias</span>
      </a>

      <a routerLink="/alunos">
        <i class="fa-solid fa-user"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Alunos</span>
      </a>

      <a routerLink="/professores">
        <i class="fa-solid fa-user-tie"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Professores</span>
      </a>

      <a routerLink="/modalidades">
        <i class="fa-solid fa-hand-fist"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Modalidades</span>
      </a>

      <a routerLink="/planos">
        <i class="fa-solid fa-money-bill"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Planos</span>
      </a>

      <a routerLink="/planos">
        <i class="fa-solid fa-money-bill"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Gestão Financeira</span>
      </a>

      <a *ngIf="isAdmin()" routerLink="/usuarios">
        <i class="fa-solid fa-users"></i>
        <span *ngIf="!sidebarCollapsed" routerLinkActive="active">Usuários</span>
      </a>
    </nav>
  </aside>

  <div class="main">
    <!-- TOPBAR -->

    <header class="topbar">
      <div class="topbar-title">
        {{ academiaNome }}
      </div>

      <div class="topbar-right">
        <i class="fa-solid fa-bell"></i>

        <!-- USUÁRIO -->
        <div class="user-info">
          <div class="user-text">
            <span class="user-name">{{ userName }}</span>
            <span class="user-academia">{{ academiaNome }}</span>
          </div>

          <div class="avatar">
            {{ userName?.charAt(0) }}
          </div>
        </div>

        <!-- LOGOUT -->
        <button class="btn-logout" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </header>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
